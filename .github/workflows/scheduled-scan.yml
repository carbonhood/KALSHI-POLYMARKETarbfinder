name: Scheduled Arb Scan

on:
  schedule:
    # Every 15 minutes (UTC). Scans take several minutes — do not run more often.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      use_cached:
        description: "Use cached API JSON (faster test run)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: arb-scan-publish
  cancel-in-progress: false

jobs:
  scan-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout prior scan-data (for history)
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: scan-data
          path: prior-scan-data

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan and build publish payload
        id: scan
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          ARGS="--prior-dir prior-scan-data"
          if [ "${{ github.event.inputs.use_cached }}" = "true" ]; then
            ARGS="$ARGS --cached"
          fi
          python scripts/publish_scan_for_github.py $ARGS

      - name: Verify publish payload exists
        run: |
          test -d publish-data || (echo "publish-data/ missing" && exit 1)
          test -f publish-data/scan_meta.json || (echo "scan_meta.json missing" && exit 1)
          ls -la publish-data/

      - name: Publish to scan-data branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          WORK="$(mktemp -d)"
          cp -r publish-data/* "$WORK/"

          cd "$WORK"
          git init -b scan-data
          git add -A
          git commit -m "scan $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          REPO="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@${REPO#https://}"
          git push --force origin scan-data

      - name: Report scan status
        if: steps.scan.outcome == 'failure'
        run: |
          echo "::warning::Scan step failed but error metadata was still published to scan-data."
          exit 0
